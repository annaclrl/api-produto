<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gestão de Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-dot"></div>
        <h1>Produto<span>.</span>io</h1>
    </div>
    <span class="api-badge">localhost:8080/produtos</span>
</header>

<main>
    <div class="page-header">
        <div>
            <h1 class="page-title">Gestão de <em>Produtos</em></h1>
            <p class="count-badge" id="count-label">— produtos cadastrados</p>
        </div>
    </div>

    <div class="form-panel">
        <h2>Novo Produto</h2>
        <div class="form-grid">
            <div class="field">
                <label>Nome</label>
                <input id="inp-nome" type="text" placeholder="ex: Camiseta P" />
            </div>
            <div class="field" style="grid-column: span 2">
                <label>Descrição</label>
                <input id="inp-descricao" type="text" placeholder="ex: Camiseta 100% algodão" />
            </div>
            <div class="field">
                <label>Preço (R$)</label>
                <input id="inp-preco" type="number" step="0.01" placeholder="29.90" />
            </div>
            <div class="field">
                <label>Quantidade</label>
                <input id="inp-quantidade" type="number" placeholder="100" />
            </div>
            <button class="btn btn-primary" onclick="criarProduto()">+ Adicionar</button>
        </div>
    </div>

    <div class="table-wrap">
        <div class="table-toolbar">
            <h2>Lista de Produtos</h2>
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input id="search" type="text" placeholder="Filtrar..." oninput="filtrarTabela()" />
            </div>
        </div>
        <div id="table-container">
            <div class="loading">carregando produtos...</div>
        </div>
    </div>
</main>

<div class="modal-backdrop" id="modal">
    <div class="modal">
        <h2>Editar Produto</h2>
        <input type="hidden" id="edit-id" />
        <div class="field">
            <label>Nome</label>
            <input id="edit-nome" type="text" />
        </div>
        <div class="field">
            <label>Descrição</label>
            <input id="edit-descricao" type="text" />
        </div>
        <div class="field">
            <label>Preço (R$)</label>
            <input id="edit-preco" type="number" step="0.01" />
        </div>
        <div class="field">
            <label>Quantidade</label>
            <input id="edit-quantidade" type="number" />
        </div>
        <div class="form-actions">
            <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
